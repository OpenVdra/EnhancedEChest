name: Release

# Two ways to release:
#   1. Publish a GitHub Release (drafts do NOT trigger this — you must click "Publish").
#   2. Run it by hand from the Actions tab ("Run workflow"). In that case the workflow
#      auto-creates the tag + GitHub Release from the Gradle version if one doesn't exist
#      yet, so you don't have to create a tag first.
on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      changelog:
        description: "Release notes / changelog. Leave empty to auto-generate from commits."
        required: false
        type: string

permissions:
  contents: write   # needed to create the tag/release and attach the built jar

env:
  # Game versions these uploads target. Must match the version lists that exist on
  # Modrinth and Hangar. Keep this set in sync with the platforms when you add a new one.
  GAME_VERSIONS: "1.21.11,26.1,26.1.1,26.1.2,26.2"
  MODRINTH_ID: "xgEWccga"
  # Your project slug on hangar.papermc.io. Verify it matches the project you created.
  HANGAR_SLUG: "EnhancedEchest"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shadow jar
        run: |
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon

      - name: Resolve version and jar path
        id: meta
        run: |
          VERSION=$(./gradlew properties -q --no-daemon | grep "^version:" | awk '{print $2}')
          JAR=$(ls build/libs/EnhancedEchest-*.jar | head -n1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"

      # Make sure a GitHub Release (and its tag) exists for this version. On a
      # `release: published` event it already does — we just take its tag. On a manual
      # `workflow_dispatch` run we create the tag + Release from the Gradle version if it
      # isn't there yet, so "Run workflow" is enough to cut a release. The tag is the bare
      # version (e.g. 1.0.2), no "v" prefix. Creating a release with GITHUB_TOKEN does not
      # re-trigger this workflow, so there is no double publish.
      - name: Ensure GitHub release exists
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.meta.outputs.version }}
          INPUT_CHANGELOG: ${{ github.event.inputs.changelog }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="$VERSION"
            if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              if [ -n "$INPUT_CHANGELOG" ]; then
                gh release create "$TAG" --repo "$REPO" --target "${{ github.ref_name }}" \
                  --title "EnhancedEchest $VERSION" --notes "$INPUT_CHANGELOG"
              else
                gh release create "$TAG" --repo "$REPO" --target "${{ github.ref_name }}" \
                  --title "EnhancedEchest $VERSION" --generate-notes
              fi
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Resolve the changelog once from the GitHub Release (single source of truth) and
      # reuse it for Modrinth, Hangar and Discord. This is why the version showed up but
      # the changelog was blank before — version comes from Gradle, the changelog lives on
      # the release.
      - name: Resolve changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          BODY=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body' 2>/dev/null || true)
          if [ -z "$BODY" ]; then
            BODY="See the GitHub release for details."
          fi
          {
            echo "body<<__CHANGELOG_EOF__"
            echo "$BODY"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"
          URL=$(gh release view "$TAG" --repo "$REPO" --json url --jq '.url' 2>/dev/null || true)
          if [ -z "$URL" ]; then
            URL="https://github.com/$REPO/releases"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # Each publish step below runs independently: a failure in one does not skip the
      # others (if: !cancelled), but all of them require the build and metadata to succeed.

      - name: Attach jar to the GitHub release
        if: ${{ !cancelled() && steps.meta.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag }}" \
            "${{ steps.meta.outputs.jar }}" --clobber --repo "${{ github.repository }}"

      - name: Publish to Modrinth
        # Calls the Modrinth API directly. mc-publish is avoided here because it filters
        # game versions against a bundled Minecraft manifest that has no 26.x entries,
        # which drops every version and fails the upload. The API accepts them as-is.
        if: ${{ !cancelled() && steps.meta.outcome == 'success' }}
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          JAR: ${{ steps.meta.outputs.jar }}
          CHANGELOG: ${{ steps.changelog.outputs.body }}
        run: |
          GAME_VERSIONS_JSON=$(printf '%s' "$GAME_VERSIONS" | jq -R 'split(",")')
          DATA=$(jq -n \
            --arg project_id "$MODRINTH_ID" \
            --arg version_number "$VERSION" \
            --arg name "EnhancedEchest $VERSION" \
            --arg changelog "$CHANGELOG" \
            --argjson game_versions "$GAME_VERSIONS_JSON" \
            '{
              project_id: $project_id,
              version_number: $version_number,
              name: $name,
              version_type: "release",
              changelog: $changelog,
              game_versions: $game_versions,
              loaders: ["paper"],
              dependencies: [],
              featured: true,
              file_parts: ["file"],
              primary_file: "file"
            }')
          curl -sS --fail-with-body -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=$DATA" \
            -F "file=@$JAR;type=application/java-archive"

      - name: Publish to Hangar
        if: ${{ !cancelled() && steps.meta.outcome == 'success' }}
        uses: milkdrinkers/Hangar-Publish@v2
        with:
          api_token: ${{ secrets.HANGAR_API_TOKEN }}
          slug: ${{ env.HANGAR_SLUG }}
          version: ${{ steps.meta.outputs.version }}
          channel: Release
          description: ${{ steps.changelog.outputs.body }}
          files: |
            [
              { "path": "${{ steps.meta.outputs.jar }}", "platforms": ["PAPER"] }
            ]
          platform_dependencies: |
            { "PAPER": ["1.21.11", "26.1", "26.1.1", "26.1.2", "26.2"] }

      - name: Announce on Discord
        if: ${{ !cancelled() && steps.meta.outcome == 'success' }}
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "EnhancedEchest ${{ steps.meta.outputs.version }} released"
          embed-description: ${{ steps.changelog.outputs.body }}
          embed-url: ${{ steps.changelog.outputs.url }}
          embed-color: "5763719"
